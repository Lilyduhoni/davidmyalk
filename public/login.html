<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DAVID MYALIK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .auth-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(ellipse at 20% 50%, rgba(255,0,0,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(0,240,255,0.03) 0%, transparent 50%),
                        var(--navy);
        }
        .back-home {
            position: absolute; top: 20px; left: 20px;
            display: flex; align-items: center; gap: 8px;
            color: var(--text-muted); font-family: var(--font-mono); font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.3s;
        }
        .back-home:hover { color: var(--primary); }
        .back-home svg { transition: transform 0.3s; }
        .back-home:hover svg { transform: translateX(-3px); }
    </style>
</head>
<body>
    <div class="auth-bg"></div>

    <a href="/" class="back-home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Store
    </a>

    <div class="auth-page">
        <div class="auth-card">
            <div style="text-align:center; margin-bottom: 40px;">
                <a href="/" class="nav-brand" style="font-size:32px;">DAVID <span>MYALIK</span></a>
                <p class="font-mono text-muted" style="margin-top:12px; font-size:11px; letter-spacing:0.15em;">SIGN IN TO YOUR ACCOUNT</p>
            </div>

            <div id="error-msg" style="display:none; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); padding:12px 16px; margin-bottom:24px; font-family:var(--font-mono); font-size:12px; color:#ef4444;"></div>

            <form id="login-form">
                <div style="margin-bottom:20px;">
                    <label class="input-label">EMAIL</label>
                    <input type="email" class="input-field" id="email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div style="margin-bottom:24px;">
                    <label class="input-label">PASSWORD</label>
                    <input type="password" class="input-field" id="password" required placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="submit-btn">LOGIN</button>
            </form>

            <div style="margin-top:24px; text-align:center;">
                <a href="/forgot-password" class="font-mono text-xs text-muted" style="transition:color 0.3s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color=''">Forgot your password?</a>
            </div>

            <div style="margin-top:32px; padding-top:24px; border-top:1px solid var(--border); text-align:center;">
                <p class="font-mono text-xs text-muted">Don't have an account?
                    <a href="/signup" style="color:var(--primary); font-weight:bold;">SIGN UP</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    errEl.textContent = data.error;
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'LOGIN';
                    return;
                }
                if (data.user.role === 'admin' || data.user.role === 'owner') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/dashboard';
                }
            } catch (err) {
                errEl.textContent = 'Something went wrong. Please try again.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'LOGIN';
            }
        });
    </script>
</body>
</html>
